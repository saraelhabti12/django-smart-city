{% extends 'base.html' %}

{% block title %}Delete Incident - Smart City Admin{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 class="mb-0 d-flex align-items-center">
            <a href="{% url 'incident-list' %}" class="btn btn-sm btn-outline-secondary me-3 border-0"><i class="bi bi-arrow-left fs-5"></i></a>
            Delete Incident
        </h2>
    </div>
</div>

<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-lg text-center overflow-hidden rounded-3">
            <div class="bg-danger text-white p-5 position-relative">
                <div class="position-absolute top-50 start-50 translate-middle opacity-25">
                    <i class="bi bi-shield-x" style="font-size: 15rem;"></i>
                </div>
                <i class="bi bi-exclamation-triangle-fill display-1 mb-3 position-relative z-1"></i>
                <h2 class="mb-0 position-relative z-1 fw-bold">Are you absolutely sure?</h2>
            </div>
            <div class="card-body p-5">
                <p class="lead mb-4 text-muted">You are about to permanently delete the incident:</p>
                <div class="bg-light border rounded p-4 mb-4 d-inline-block shadow-sm">
                    <h2 class="display-6 fw-bold mb-0 text-dark">{{ incident.title }}</h2>
                </div>
                <p class="text-danger mb-5"><i class="bi bi-info-circle-fill me-1"></i> This action cannot be undone.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'incident-list' %}" class="btn btn-light border btn-lg px-5">Cancel</a>
                        <button type="submit" class="btn btn-danger btn-lg px-5"><i class="bi bi-trash3-fill me-2"></i> Yes, Delete it</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
