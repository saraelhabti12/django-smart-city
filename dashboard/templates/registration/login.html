{% extends 'base.html' %}

{% block title %}Login - Smart City Admin{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="card border-0 shadow-lg rounded-3 overflow-hidden">
            <div class="card-header bg-dark text-white text-center p-4 border-0">
                <i class="bi bi-buildings-fill display-4 text-primary mb-2"></i>
                <h3 class="fw-bold mb-0">Smart City Admin</h3>
                <p class="text-white-50 small mb-0">Sign in to access the dashboard</p>
            </div>
            <div class="card-body p-4 p-md-5">
                {% if form.errors %}
                    <div class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                        <i class="bi bi-exclamation-triangle-fill flex-shrink-0 me-2"></i>
                        <div>Invalid username or password. Please try again.</div>
                    </div>
                {% endif %}
                
                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label for="{{ form.username.id_for_label }}" class="form-label fw-bold text-secondary">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" class="form-control border-start-0 ps-0" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="{{ form.password.id_for_label }}" class="form-label fw-bold text-secondary">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" class="form-control border-start-0 ps-0" required>
                        </div>
                    </div>

                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
                        </button>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
